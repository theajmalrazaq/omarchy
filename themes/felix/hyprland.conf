general {
    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors

    layout = dwindle
    gaps_in = 3
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(3a3c3fff)
    col.inactive_border = rgba(101010FF)
}

decoration {
    rounding = 0
	dim_special = 1
    active_opacity = 1.0
    inactive_opacity = 0.85
    
    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 8
        passes = 1
        vibrancy = 0.1696
        #
        enabled = true
        size = 8
        passes = 1
        new_optimizations = true
        xray = false
		    contrast = 0.7
		    brightness = 0.5
		    noise = 0.1
		    # vibrancy = 80
		    vibrancy_darkness = 0.0
		    special = true
    }
}

group {
    col.border_active = rgba(2E3134FF)
    col.border_inactive = rgba(101010FF)
    auto_group = true

    groupbar {
        # rounding = 10
        font_family = JetBrainsMono Nerd Font Mono
        font_size = 10
        height = 40
        text_offset = -1
        indicator_gap = 2
        indicator_height = 1
        col.active = rgba(000000FF)
        col.inactive = rgba(000000FF)
        text_color = rgba(e7e9eaff)
        text_color_inactive = rgba(808080ff)
        gaps_in = 0
        gaps_out = 0
        # font_weight_active = bold
        # font_weight_inactive = normal
    }
}
