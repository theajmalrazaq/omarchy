source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
    grace = 2
    hide_cursor = true
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 4
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

label {
    monitor =
    text = cmd[update:0] cat /home/theajmalrazaq/.local/share/omarchy/logo.txt
    color = $font_color
    font_size = 10
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 200
    halign = center
    valign = center
    text_align = left  # This is CRITICAL for ASCII art compatibility
}



# User greeting
label {
    monitor =
    text = Welcome Back, $USER
    color = $font_color
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}

# Password input field
input-field {
    monitor =
    size = 350, 60
    position = 0, -180
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 3

    font_family = JetBrainsMono Nerd Font
    font_color = $font_color
    font_size = 16

    placeholder_text =  Enter Password
    check_color = $check_color
    fail_color = rgba(255, 50, 50, 1.0)
    fail_text = <i>Authentication Failed (Attempt $ATTEMPTS)</i>

    rounding = 12
    fade_on_empty = true
    fade_timeout = 1000
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
}

# Fingerprint status
label {
    monitor =
    text =  Fingerprint Available
    color = $font_color
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -260
    halign = center
    valign = center
}

# System info footer
label {
    monitor =
    text = cmd[update:60000] echo " $(uname -n) | $(uname -r)"
    color = $font_color
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = bottom
}

animations {
    enabled = true
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    animation = windows, 1, 7, easeOutExpo, slide
    animation = fade, 1, 7, easeOutExpo
}

auth {
    fingerprint:enabled = true
    fingerprint:ready_msg = Scan fingerprint to unlock
    fingerprint:present_msg = Scanning...
}
